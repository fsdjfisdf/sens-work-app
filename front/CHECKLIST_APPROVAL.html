<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist Approval — S-WORKS</title>
  <link rel="stylesheet" href="./css/checklist_approval.css" />
  <script defer src="./js/checklist_approval.js"></script>
</head>
<body>
  <header class="shell-nav">
    <div class="shell-nav__inner">
      <div class="brand-wrap">
        <a href="./index.html" class="brand">S-WORKS</a>
        <span class="brand-sub">Approval</span>
      </div>

      <nav class="nav-links" aria-label="주요 메뉴">
        <a href="./CHECKLIST.html">Checklist</a>
        <a href="./CHECKLIST_APPROVAL.html" class="is-active">Approval</a>
      </nav>

      <div id="userBadge" class="user-badge">로딩 중</div>
    </div>
  </header>

  <main class="page-shell">
    <section class="status-tabs card">
      <button type="button" class="status-tab is-active" data-status="SUBMITTED">
        <span>결재 대기</span>
        <strong id="submittedCount">0</strong>
      </button>
      <button type="button" class="status-tab" data-status="REJECTED">
        <span>반려</span>
        <strong id="rejectedCount">0</strong>
      </button>
      <button type="button" class="status-tab" data-status="APPROVED">
        <span>승인 완료</span>
        <strong id="approvedCount">0</strong>
      </button>
    </section>

    <section class="filter-card card">
      <div class="filter-grid">
        <label class="field">
          <span>설비</span>
          <select id="equipmentFilter">
            <option value="">전체</option>
          </select>
        </label>
        <label class="field">
          <span>유형</span>
          <select id="kindFilter">
            <option value="">전체</option>
            <option value="SETUP">SETUP</option>
            <option value="MAINT">MAINT</option>
          </select>
        </label>
        <label class="field field-grow">
          <span>검색</span>
          <input id="keywordInput" type="text" placeholder="작성자 또는 설비 검색" />
        </label>
        <button id="reloadBtn" type="button" class="btn btn-line">새로고침</button>
      </div>
    </section>

    <section class="workspace-grid">
      <aside class="queue-card card">
        <div class="queue-head">
          <h2>목록</h2>
          <span id="queueCountBadge" class="queue-count">0건</span>
        </div>
        <div id="queueList" class="queue-list empty-box">목록을 불러오는 중입니다.</div>
      </aside>

      <section class="detail-card card">
        <div class="detail-head">
          <div>
            <h2 id="detailTitle">항목을 선택하세요.</h2>
            <p id="detailMeta" class="detail-meta">왼쪽 목록에서 한 건을 선택하면 상세가 표시됩니다.</p>
          </div>
          <span id="detailStatusPill" class="status-pill status-pill--idle">-</span>
        </div>

        <div class="summary-grid">
          <div class="summary-box">
            <span>작성자</span>
            <strong id="detailEngineer">-</strong>
          </div>
          <div class="summary-box">
            <span>설비 / 유형</span>
            <strong id="detailEquipment">-</strong>
          </div>
          <div class="summary-box">
            <span>완료율</span>
            <strong id="detailCompletion">-</strong>
          </div>
          <div class="summary-box">
            <span>반려 / 결재 코멘트</span>
            <strong id="detailComment">-</strong>
          </div>
        </div>

        <section id="comparisonCard" class="comparison-card hidden">
          <div class="comparison-head">
            <div>
              <h3>최근 승인 완료본 비교</h3>
              <p id="comparisonSummary">-</p>
            </div>
            <span id="comparisonBasis" class="comparison-basis">-</span>
          </div>
          <div id="comparisonList" class="comparison-list"></div>
        </section>

        <div id="detailSections" class="detail-sections empty-box empty-box--lg">상세 체크리스트가 여기에 표시됩니다.</div>

        <div class="decision-card">
          <label class="field field-grow">
            <span>결재 코멘트</span>
            <textarea id="decisionComment" rows="3" placeholder="승인 또는 반려 사유를 남길 수 있습니다."></textarea>
          </label>
          <div class="decision-actions">
            <button id="approveBtn" type="button" class="btn btn-line">승인</button>
            <button id="rejectBtn" type="button" class="btn btn-line">반려</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
</body>
</html>
