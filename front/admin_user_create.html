<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자 관리</title>
  <link rel="stylesheet" href="./admin_user_create.css" />
</head>
<body>
  <div class="page-shell">
    <div class="page-header">
      <div>
        <h1>사용자 관리</h1>
        <p>사용자 생성과 계정 활성/비활성 관리를 할 수 있습니다.</p>
      </div>
      <button class="ghost-btn" id="refreshBtn" type="button">새로고침</button>
    </div>

    <section class="panel">
      <div class="panel-header">
        <h2>새 사용자 생성</h2>
      </div>

      <form id="adminUserForm" class="create-form">
        <div class="grid">
          <div class="field">
            <label for="userId">아이디</label>
            <input type="text" id="userId" name="userId" autocomplete="off" required />
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required />
          </div>

          <div class="field">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="field">
            <label for="status">계정 상태</label>
            <select id="status" name="status">
              <option value="1">활성</option>
              <option value="0">비활성</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>권한</label>
          <div class="role-cards" id="roleCards">
            <label class="role-card selected">
              <input type="radio" name="role" value="A" checked />
              <span class="role-code">A</span>
              <span class="role-title">관리자</span>
              <span class="role-desc">사용자 관리, 주요 설정 변경 가능</span>
            </label>

            <label class="role-card">
              <input type="radio" name="role" value="I" />
              <span class="role-code">I</span>
              <span class="role-title">일반 사용자</span>
              <span class="role-desc">일반 업무 기능 사용 가능</span>
            </label>

            <label class="role-card">
              <input type="radio" name="role" value="D" />
              <span class="role-code">D</span>
              <span class="role-title">조회 전용</span>
              <span class="role-desc">조회만 가능, 등록/수정/삭제 제한</span>
            </label>
          </div>
        </div>

        <div class="button-row">
          <button class="primary-btn" type="submit">사용자 저장</button>
          <button class="secondary-btn" type="button" id="resetBtn">초기화</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header panel-header-wrap">
        <div>
          <h2>계정 상태 관리</h2>
          <p class="section-desc">퇴사자나 미사용 계정은 비활성화할 수 있습니다.</p>
        </div>

        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="이름 또는 아이디 검색" />
          <select id="statusFilter">
            <option value="all">전체</option>
            <option value="1">활성만</option>
            <option value="0">비활성만</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table class="user-table">
          <thead>
            <tr>
              <th>아이디</th>
              <th>이름</th>
              <th>권한</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr>
              <td colspan="5" class="empty-row">사용자 목록을 불러오는 중입니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./admin_user_create.js"></script>
</body>
</html>
