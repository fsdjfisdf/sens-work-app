<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist — S-WORKS</title>
  <link rel="stylesheet" href="./css/checklist.css" />
  <script defer src="./js/checklist.js"></script>
</head>
<body>
  <header class="shell-nav">
    <div class="shell-nav__inner">
      <div class="brand-wrap">
        <a href="./index.html" class="brand">S-WORKS</a>
        <span class="brand-sub">Checklist</span>
      </div>

      <nav class="nav-links" aria-label="주요 메뉴">
        <a href="./CHECKLIST.html" class="is-active">Checklist</a>
        <a href="./CHECKLIST_APPROVAL.html" id="approvalLink" class="hidden">Approval</a>
      </nav>

      <div id="userBadge" class="user-badge">로딩 중</div>
    </div>
  </header>

  <main class="page-shell">
    <section class="selector card">
      <div class="selector-head">
        <h1>체크리스트 작성</h1>
        <p>설비와 유형만 선택하면 바로 체크할 수 있습니다.</p>
      </div>
      <div id="equipmentBoard" class="equipment-board"></div>
    </section>

    <section class="checklist-wrap card">
      <div class="checklist-top">
        <div>
          <h2 id="templateTitle">체크리스트</h2>
          <p id="templateMeta" class="template-meta">설비를 선택하세요.</p>
        </div>

        <div class="mini-status-wrap">
          <div class="mini-status-row">
            <span id="statusPill" class="status-pill status-pill--idle">대기</span>
            <div class="mini-status-text">
              <strong id="statusLabel">-</strong>
              <span id="statusDate">-</span>
            </div>
          </div>
          <p id="statusMessage" class="status-message status-message--idle">설비를 선택하면 상태가 여기에 표시됩니다.</p>
        </div>
      </div>

      <div id="checklistSections" class="empty-box empty-box--lg">체크리스트를 불러오는 중입니다.</div>

      <div class="action-bar">
        <button id="saveBtn" type="button" class="btn btn-line">임시 저장</button>
        <button id="submitBtn" type="button" class="btn btn-primary">결재 요청</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
</body>
</html>
